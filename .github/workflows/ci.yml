# PR-side CI for cognic-tool-approval-probe.
#
# Two lanes:
#   - lint-type-unit     ruff lint + format check + mypy (strict) + the unit suite
#                         (no external services — the ledger tests run on tmp_path)
#   - authoring-validate via the kernel dev extra's `agentos validate` build-time
#                         manifest-shape check (placeholder attestations seeded on
#                         the runner; real cosign/SBOM bundle + `agentos verify`
#                         are release)
#
# Signing/publishing (`agentos sign --bundle` + `agentos verify`) is RELEASE
# work — it shells out to cosign / syft / grype / pip-licenses — and lives in
# .github/workflows/sign-and-publish.yml + release.sh, not here.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-type-unit:
    name: lint + type + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # uv.lock is intentionally gitignored in this repo (the pyproject pins are
      # the source of truth), so sync resolves at CI time — NOT `--frozen`.
      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Type-check (strict)
        run: uv run mypy src tests

      - name: Unit tests
        run: uv run pytest tests/ -q

  authoring-validate:
    name: authoring (agentos validate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The `dev` extra git-pins `cognic-agentos` (exact anchor in pyproject.toml), which provides
      # the `agentos` authoring/governance CLI used for the build-time check.
      - name: Sync dev dependencies (installs the kernel-pinned authoring CLI)
        run: uv sync --extra dev

      # `agentos validate` checks the manifest against the build-time trust gate,
      # which includes that each declared [supply_chain].attestation_paths file
      # exists + is non-empty (no unfilled template markers). The REAL bundle
      # (cosign sig + CycloneDX SBOM) is produced by `agentos sign --bundle .` at
      # release (release.sh / sign-and-publish.yml); it shells out to cosign /
      # syft / grype / pip-licenses, which are absent from this PR lane. So here
      # we seed throwaway placeholders — this makes the lane a manifest-SHAPE
      # check, NOT a signature/SBOM-content check (that is `agentos verify` at
      # release). The placeholders are created on the runner only and are never
      # committed.
      - name: Seed placeholder attestations (manifest-shape check only)
        run: |
          mkdir -p attestations
          printf 'ci-placeholder: cosign signature generated by `agentos sign --bundle` at release\n' > attestations/cosign.sig
          printf '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1}\n' > attestations/sbom.cdx.json

      - name: agentos validate (build-time manifest-shape check)
        run: uv run agentos validate .

      # NOTE: `agentos sign --bundle` + `agentos verify` run at RELEASE (they
      # shell out to cosign / syft / grype / pip-licenses, absent from this CI).
      # See .github/workflows/sign-and-publish.yml + release.sh — out of scope
      # for this PR-side lane.
